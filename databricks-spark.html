<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to Databricks</title>
  <meta http-equiv="refresh" content="1; url=https://credentials.databricks.com/80f0611f-4fd1-4c3c-b96b-433bc5c2243c">
  <style>
    :root {
      color-scheme: dark;
      --bg: #08111d;
      --panel: rgba(15, 29, 51, 0.88);
      --text: #edf3ff;
      --muted: #9bb0d1;
      --line: rgba(177, 198, 231, 0.16);
      --accent: #66e2c5;
      --accent-strong: #2bc2ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "DM Sans", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(43, 194, 255, 0.16), transparent 28%),
        radial-gradient(circle at 85% 12%, rgba(255, 184, 107, 0.12), transparent 22%),
        linear-gradient(180deg, #08111d 0%, #0c1729 55%, #09101d 100%);
    }
    .redirect-card {
      width: min(100%, 540px);
      padding: 36px 32px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(19, 37, 64, 0.92), rgba(10, 22, 40, 0.92));
      border: 1px solid var(--line);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      text-align: center;
    }
    .eyebrow {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0 0 12px;
      font-family: "Space Grotesk", Arial, sans-serif;
      font-size: clamp(1.6rem, 4vw, 2.3rem);
      line-height: 1.05;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 0.98rem;
    }
    .spinner {
      width: 52px;
      height: 52px;
      margin: 0 auto 22px;
      border-radius: 50%;
      border: 4px solid rgba(102, 226, 197, 0.18);
      border-top-color: var(--accent);
      animation: spin 1s linear infinite;
    }
    .link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 22px;
      min-height: 52px;
      padding: 0 22px;
      border-radius: 999px;
      font-weight: 700;
      color: #05101d;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      text-decoration: none;
      box-shadow: 0 18px 48px rgba(43, 194, 255, 0.28);
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <main class="redirect-card">
    <div class="spinner" aria-hidden="true"></div>
    <div class="eyebrow">Redirecting</div>
    <h1>Taking you to my Databricks Spark credential.</h1>
    <p>You should be forwarded automatically. If not, use the button below.</p>
    <a class="link" href="https://credentials.databricks.com/80f0611f-4fd1-4c3c-b96b-433bc5c2243c">Open credential</a>
  </main>
</body>
</html>
